name: ConAnima
options:
  bundleIdPrefix: com.conanima
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: ConAnima/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.conanima.cabinet
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: false
targets:
  ConAnima:
    type: application
    platform: iOS
    sources:
      - path: ConAnima
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: ConAnima/Info.plist
      properties:
        CFBundleDisplayName: CON ANIMA
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            46.101.212.67:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
              NSExceptionRequiresForwardSecrecy: false
        APIBaseURL: http://46.101.212.67:3000/api/v1
        LSRequiresIPhoneOS: true
